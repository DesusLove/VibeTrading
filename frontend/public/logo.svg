<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 48" fill="none">
  <!-- Candlestick mark -->
  <g transform="translate(4, 6)">
    <rect x="6" y="8" width="10" height="22" rx="1.5" fill="url(#g)" stroke="url(#g)" stroke-width="0.5"/>
    <rect x="10" y="4" width="2" height="6" rx="0.5" fill="url(#g)"/>
    <rect x="10" y="28" width="2" height="6" rx="0.5" fill="url(#g)"/>
  </g>
  <!-- Wordmark -->
  <text x="42" y="34" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="22" fill="#F5A623" letter-spacing="-0.3">VIBE</text>
  <text x="102" y="34" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="22" fill="#8B8FA3" letter-spacing="-0.3">TRADING</text>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#D4890B"/>
    </linearGradient>
  </defs>
</svg>